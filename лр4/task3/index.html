<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Title</title>
    <style>
        h1 {
            text-align: center;
            position: relative;
        }

        h1::before,
        h1::after {
            content: "";
            display: inline-block;
            width: 40%;
            height: 2px;
            background: black;
            vertical-align: middle;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<h1>TITLE</h1>

</body>
</html>
