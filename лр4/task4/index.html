<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Battery</title>
    <style>
        .battery {
            position: relative;
            width: 200px;
            height: 50px;
            border: 5px solid black;
            margin: 20px;
        }

        /* контакт батареї */
        .battery::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 15px;
            width: 10px;
            height: 20px;
            background: black;
        }

        /* рівень заряду */
        .battery::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
        }

        .low::before {
            width: 30%;
            background: red;
        }

        .medium::before {
            width: 60%;
            background: orange;
        }

        .high::before {
            width: 100%;
            background: green;
        }
    </style>
</head>
<body>

<div class="battery low"></div>
<div class="battery medium"></div>
<div class="battery high"></div>

</body>
</html>
